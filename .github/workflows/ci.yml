name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go test + vet + iron laws
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go module tidy check
        run: |
          go mod download
          test -z "$(go mod tidy && git diff --name-only -- go.mod go.sum)" || \
            (echo "go.mod/go.sum not tidy"; git diff -- go.mod go.sum; exit 1)

      - name: go vet
        run: go vet ./...

      - name: Iron laws — grep-based guardrails
        run: |
          # Rule #1: strategies must never branch on "isBacktest"
          if grep -rnE "isBacktest" internal/strategies/ internal/adapters/ internal/saas/ga/ 2>/dev/null | grep -v "_test.go" | grep -v "//"; then
            echo "::error::Iron law #1 violated: isBacktest branch found in non-test code"
            exit 1
          fi

          # Rule #5: SaaS side must never have API Key / Secret / Passphrase fields
          if grep -rnE "api_key|secret_key|passphrase" internal/saas/ 2>/dev/null | grep -v "_test.go" | grep -v "//" | grep -v "ANTHROPIC"; then
            echo "::error::Iron law #5 violated: API Key field found in SaaS side"
            exit 1
          fi

          # Rule #4a: strategy kernels must not depend on quant.Bar
          if grep -rn "quant\.Bar" internal/strategies/ 2>/dev/null | grep -v "//"; then
            echo "::error::Iron law #4a violated: strategy imports quant.Bar"
            exit 1
          fi

          # Rule #4b: strategies must not import I/O packages
          if grep -rnE "^\s*\"(net/http|database/sql|os/exec|gorilla)" internal/strategies/ 2>/dev/null; then
            echo "::error::Iron law #4b violated: strategies import I/O packages"
            exit 1
          fi

          echo "All iron laws passed ✓"

      - name: Unit tests with race detector
        run: go test ./... -race -timeout 5m

      - name: Build all binaries
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/saas ./cmd/saas
          go build -ldflags="-s -w" -o bin/agent ./cmd/agent
          go build -ldflags="-s -w" -o bin/collector ./cmd/collector
          ls -lh bin/

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install deps
        run: npm install

      - name: Type check + build
        run: npm run build

      - name: Check dist size
        run: du -sh dist/
